name: Fallow analysis
on: [push, pull_request]

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fallow-rs/fallow@v2
        with:
          format: sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fallow-results.sarif
